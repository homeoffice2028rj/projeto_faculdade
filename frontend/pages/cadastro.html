<!DOCTYPE html>
<html lang="pt-BR">

<head>

   <meta charset="UTF-8">

   <meta
      name="viewport"
      content="
         width=device-width,
         initial-scale=1.0
      "
   >

   <title>Cadastro</title>

   <link
      rel="stylesheet"
      href="../css/cadastro.css"
   >

</head>

<body>

   <div class="container">

      <h1>Cadastro Cliente</h1>

      <form id="formCadastro">

         <input
            type="text"
            id="nome"
            placeholder="Nome"
            required
         >

         <input
            type="email"
            id="email"
            placeholder="Email"
            required
         >

         <input
            type="password"
            id="senha"
            placeholder="Senha"
            required
         >

         <input
            type="text"
            id="telefone"
            placeholder="Telefone"
         >

         <button type="submit">

            Cadastrar

         </button>

      </form>

   </div>

   <script src="../js/cadastro.js"></script>

</body>

</html>
