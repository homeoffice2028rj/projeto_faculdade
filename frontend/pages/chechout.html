<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Checkout</title>

    <link
        rel="stylesheet"
        href="../css/checkout.css"
    >

</head>

<body>

    <main class="container">

        <h1>Entrega</h1>

        <form id="formCheckout">

            <input
                type="text"
                id="cliente"
                placeholder="Nome"
                required
            >

            <input
                type="text"
                id="telefone"
                placeholder="Telefone"
                required
            >

            <input
                type="text"
                id="rua"
                placeholder="Rua"
                required
            >

            <input
                type="text"
                id="numero"
                placeholder="Número"
                required
            >

            <input
                type="text"
                id="bairro"
                placeholder="Bairro"
                required
            >

            <input
                type="text"
                id="cidade"
                placeholder="Cidade"
                required
            >

            <input
                type="text"
                id="cep"
                placeholder="CEP"
                required
            >

            <input
                type="text"
                id="complemento"
                placeholder="Complemento"
            >

            <button type="submit">

                Finalizar Pedido

            </button>

        </form>

    </main>

    <script src="../js/checkout.js"></script>

</body>

</html>
